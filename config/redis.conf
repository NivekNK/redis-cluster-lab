# Configuración base para Redis Cluster
# Este archivo se usa como base, los parámetros específicos
# se pasan por línea de comandos en docker-compose.yml

# Modo cluster
cluster-enabled yes
cluster-config-file nodes.conf
cluster-node-timeout 5000

# Persistencia
appendonly yes
appendfsync everysec

# Seguridad (en desarrollo)
protected-mode no

# Rendimiento
tcp-keepalive 300
timeout 0
tcp-backlog 511

# Memoria
maxmemory-policy allkeys-lru

# Logging
loglevel notice
