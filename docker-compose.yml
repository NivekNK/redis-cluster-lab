version: "3.8"

services:
  # Nodos Master
  redis-node-1:
    image: redis:7-alpine
    container_name: redis-node-1
    ports:
      - "7000:7000"
      - "17000:17000"
    volumes:
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - node-1-data:/data
    command: >
      redis-server /usr/local/etc/redis/redis.conf
      --port 7000
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --cluster-announce-ip redis-node-1
      --cluster-announce-port 7000
      --cluster-announce-bus-port 17000
      --appendonly yes
      --protected-mode no
      --bind 0.0.0.0
    networks:
      - redis-cluster

  redis-node-2:
    image: redis:7-alpine
    container_name: redis-node-2
    ports:
      - "7001:7001"
      - "17001:17001"
    volumes:
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - node-2-data:/data
    command: >
      redis-server /usr/local/etc/redis/redis.conf
      --port 7001
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --cluster-announce-ip redis-node-2
      --cluster-announce-port 7001
      --cluster-announce-bus-port 17001
      --appendonly yes
      --protected-mode no
      --bind 0.0.0.0
    networks:
      - redis-cluster

  redis-node-3:
    image: redis:7-alpine
    container_name: redis-node-3
    ports:
      - "7002:7002"
      - "17002:17002"
    volumes:
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - node-3-data:/data
    command: >
      redis-server /usr/local/etc/redis/redis.conf
      --port 7002
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --cluster-announce-ip redis-node-3
      --cluster-announce-port 7002
      --cluster-announce-bus-port 17002
      --appendonly yes
      --protected-mode no
      --bind 0.0.0.0
    networks:
      - redis-cluster

  # Nodos Replica
  redis-node-4:
    image: redis:7-alpine
    container_name: redis-node-4
    ports:
      - "7003:7003"
      - "17003:17003"
    volumes:
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - node-4-data:/data
    command: >
      redis-server /usr/local/etc/redis/redis.conf
      --port 7003
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --cluster-announce-ip redis-node-4
      --cluster-announce-port 7003
      --cluster-announce-bus-port 17003
      --appendonly yes
      --protected-mode no
      --bind 0.0.0.0
    networks:
      - redis-cluster

  redis-node-5:
    image: redis:7-alpine
    container_name: redis-node-5
    ports:
      - "7004:7004"
      - "17004:17004"
    volumes:
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - node-5-data:/data
    command: >
      redis-server /usr/local/etc/redis/redis.conf
      --port 7004
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --cluster-announce-ip redis-node-5
      --cluster-announce-port 7004
      --cluster-announce-bus-port 17004
      --appendonly yes
      --protected-mode no
      --bind 0.0.0.0
    networks:
      - redis-cluster

  redis-node-6:
    image: redis:7-alpine
    container_name: redis-node-6
    ports:
      - "7005:7005"
      - "17005:17005"
    volumes:
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - node-6-data:/data
    command: >
      redis-server /usr/local/etc/redis/redis.conf
      --port 7005
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --cluster-announce-ip redis-node-6
      --cluster-announce-port 7005
      --cluster-announce-bus-port 17005
      --appendonly yes
      --protected-mode no
      --bind 0.0.0.0
    networks:
      - redis-cluster

  # Contenedor para ejecutar tests PHP
  redis-lab:
    image: php:8.2-cli
    container_name: redis-lab
    volumes:
      - .:/app
    working_dir: /app
    command: tail -f /dev/null
    networks:
      - redis-cluster
    depends_on:
      - redis-node-1
      - redis-node-2
      - redis-node-3
      - redis-node-4
      - redis-node-5
      - redis-node-6

networks:
  redis-cluster:
    driver: bridge

volumes:
  node-1-data:
  node-2-data:
  node-3-data:
  node-4-data:
  node-5-data:
  node-6-data:
